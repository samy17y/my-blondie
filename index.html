<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blondie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffc0e0;
            min-height: 100vh;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text x="10" y="50" font-size="40">❤️</text><text x="50" y="50" font-size="40">💖</text></svg>');
            background-size: 150px 150px;
            background-repeat: repeat;
            background-attachment: fixed;
        }
        body::before {
            display: none;
        }
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(10deg);
            }
            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }
        .container {
            display: flex;
            align-items: center;
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .content {
            flex: 1;
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        h1 {
            color: #ff00ff;
            font-size: 36px;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        p {
            font-size: 20px;
            color: #ff00ff;
            line-height: 1.8;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        .image-container {
            flex: 1;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>I Love My Favorite Cow</h1>
            <p>I have so much love for my favorite cow. She's absolutely wonderful because she's so good-hearted and blonde—which makes her a little bit silly and goofy, but that's exactly what makes her so entertaining and fun to be around! She brings so much joy and laughter to my life.</p>
        </div>
        <div class="image-container">
            <img src="mucca scottona.jpg" alt="mucca scottona">
        </div>
    </div>
</body>
</html>
